  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:#0a1628;color:#fff;
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;padding:24px;
      -webkit-font-smoothing:antialiased;
    }
    .card{
      max-width:520px;
      background:rgba(15,30,48,0.8);
      border:1px solid rgba(43,78,255,0.22);
      border-radius:24px;padding:60px 48px;
      position:relative;overflow:hidden;
    }
    .card::before{
      content:'';position:absolute;top:-1px;left:15%;right:15%;height:1px;
      background:linear-gradient(90deg,transparent,#2B4EFF,transparent);
    }
    .check{
      width:64px;height:64px;border-radius:50%;
      background:rgba(43,78,255,0.12);border:1px solid rgba(43,78,255,0.3);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;font-size:28px;
    }
    h1{font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}
    p{font-size:16px;color:#9AADCA;line-height:1.75;margin-bottom:32px}
    .btn{
      display:inline-block;background:#2B4EFF;color:#fff;
      padding:13px 32px;border-radius:10px;font-size:15px;font-weight:700;
      text-decoration:none;transition:background 0.2s;
      box-shadow:0 0 24px rgba(43,78,255,0.35);
    }
    .btn:hover{background:#4D6BFF}
    .logo{margin:0 auto 36px;height:28px;width:auto}
  </style>
</head>
